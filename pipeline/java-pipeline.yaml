apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: java-pipeline
spec:
  params:
    - default: openshift-quickstart
      description: name of the deployment to be patched
      name: deployment-name
      type: string
    - default: 'https://github.com/openlab-red/openshift-quickstart/'
      description: url of the git repo for the code of deployment
      name: git-url
      type: string
    - default: main
      description: revision to be used from repo of the code for deployment
      name: git-revision
      type: string
    - default: quay.io/bit-play/openshift-quickstart
      description: image to be build from the code
      name: IMAGE
      type: string
    - default: java
      description: maven context dir
      name: CONTEXT_DIR
      type: string
  tasks:
    - name: fetch-repository
      params:
        - name: url
          value: $(params.git-url)
        - name: subdirectory
          value: ''
        - name: deleteExisting
          value: 'true'
        - name: revision
          value: $(params.git-revision)
      taskRef:
        kind: ClusterTask
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: build
      params:
        - name: MAVEN_IMAGE
          value: >-
            image-registry.openshift-image-registry.svc:5000/openshift/java:latest
        - name: GOALS
          value:
            - package
            - '-DWORKSPACE_NAMESPACE=bit-play'
            - '-Dquarkus.container-image.builder=jib'
            - '-Dquarkus.container-image.push=true'
        - name: CONTEXT_DIR
          value: $(params.CONTEXT_DIR)
      runAfter:
        - fetch-repository
      taskRef:
        kind: ClusterTask
        name: maven
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: shared-workspace
  workspaces:
    - name: shared-workspace
