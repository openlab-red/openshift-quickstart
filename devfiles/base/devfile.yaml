commands: []
components:
  - attributes:
      pod-overrides:
        metadata:
          labels:
            devfile.io/name: base
            devfile.io/type: developer-image
    container:
      cpuLimit: "8"
      cpuRequest: "1"
      env:
        - name: KUBEDOCK_ENABLED
          value: "true"
        - name: PULL_POLICY
          value: "always"
        - name: INIT_IMAGE
          value: docker-hub.nexus.bit.admin.ch/joyrex2001/kubedock:0.18.1
        - name: KUBEDOCK_TIMEOUT
          value: '120'
        - name: KUBECONFIG
          value: "/home/user/.kube/config"
        - name: DOCKER_HOST
          value: 'tcp://127.0.0.1:2475'
        - name: SSL_CERT_DIR
          value: /var/run/secrets/kubernetes.io/serviceaccount
      image: quay.io/mmascia/universal-developer-image:latest
      memoryLimit: 8G
      memoryRequest: 1G
      mountSources: true
      sourceMapping: /projects
      endpoints:
        - exposure: none
          name: kubedock
          protocol: tcp
          targetPort: 2475
      volumeMounts: []
    name: developer-image
events:
  postStart: []
  preStart: []
  preStop: []
metadata:
  name: ssf
  version: 1.0.0
  displayName: Devfile
  description: Devfile for OpenShift DevSpace.
projects: []
schemaVersion: 2.3.0
